version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: chatapp-postgres
    restart: always
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpassword
      POSTGRES_DB: chatapp
    ports:
      - "5432:5432"
    volumes:
      - chatapp_data:/var/lib/postgresql/data

volumes:
  chatapp_data: